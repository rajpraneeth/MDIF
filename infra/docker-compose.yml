services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mdif}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdif}
      POSTGRES_DB: ${POSTGRES_DB:-mdif}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mdif}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    env_file:
      - path: ../.env
        required: false
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mdif}:${POSTGRES_PASSWORD:-mdif}@postgres:5432/${POSTGRES_DB:-mdif}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    env_file:
      - path: ../.env
        required: false
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
